  b4:{temp:"aus",   rostart:"gusseisen"},
  heck:{temp:"aus", rostart:"gusseisen"},
};
function loadSetup() {
  try {
    const s=localStorage.getItem("gr_setup");
    if(!s) return DEFAULT_SETUP;
    const parsed=JSON.parse(s);
    // Migrate old flat format to new per-burner format
    if(typeof parsed.b1==="string"){
      return {
        b1:{temp:parsed.b1||"mittel",rostart:"gusseisen"},
        b2:{temp:parsed.b2||"hoch",  rostart:"gusseisen"},
        b3:{temp:parsed.b3||"mittel",rostart:"platte"},
        b4:{temp:parsed.b4||"aus",   rostart:"gusseisen"},
        heck:{temp:parsed.heck||"aus",rostart:"gusseisen"},
      };
    }
    return parsed;
  } catch(e){return DEFAULT_SETUP;}
}
function saveSetup(s) { try { localStorage.setItem("gr_setup",JSON.stringify(s)); } catch(e){} }
function getTemp(setup,zid){ return setup[zid]?.temp||setup[zid]||"aus"; }
function getRostart(setup,zid){ return setup[zid]?.rostart||"gusseisen"; }
function getBestZone(food,setup) {
  const avail=(food.zones||[food.rec]).filter(z=>z!=="infrarot");
  return avail.find(z=>getTemp(setup,z)===food.wantedTemp)||food.rec;
}
const fmt = s => s<=0?"0:00":`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;

function tmStatus(tm) {
  if(tm.multiPhase){
    const cp=tm.phases[tm.currentPhase],e=(Date.now()-tm.phaseStartTime)/1000;
    const tot=cp.totalMin*60,rst=(cp.restMin||0)*60,isLast=tm.currentPhase===tm.phases.length-1;
    if(e>=tot+rst) return isLast?"done":"phase_done";
    if(e>=tot&&rst>0) return "resting";
    for(const t of cp.turns) if(e>=t*60&&e<t*60+12) return "turn";
    return "cooking";
  }
  const e=(Date.now()-tm.startTime)/1000,tot=tm.totalMin*60,rst=(tm.restMin||0)*60;
  if(e>=tot+rst) return "done";
  if(e>=tot&&rst>0) return "resting";
  for(const t of tm.turns) if(e>=t*60&&e<t*60+12) return "turn";
  return "cooking";
}

let AC=null;
function ia(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}if(AC?.state==="suspended")AC.resume();}
function tone(f,type,vol,start,dur){if(!AC||AC.state!=="running")return;try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=type;o.frequency.value=f;g.gain.setValueAtTime(0,start);g.gain.linearRampToValueAtTime(vol,start+0.01);g.gain.setTargetAtTime(0.001,start+0.05,dur/5);o.start(start);o.stop(start+dur+0.2);}catch(e){}}
function playPlop(){
  if(!AC||AC.state!=="running")return;
  const t=AC.currentTime;
  const o1=AC.createOscillator(),g1=AC.createGain();
  o1.connect(g1);g1.connect(AC.destination);
  o1.type="sine";
  o1.frequency.setValueAtTime(260,t);
  o1.frequency.exponentialRampToValueAtTime(60,t+0.12);
  g1.gain.setValueAtTime(0,t);g1.gain.linearRampToValueAtTime(1.0,t+0.005);
  g1.gain.exponentialRampToValueAtTime(0.001,t+0.38);
  o1.start(t);o1.stop(t+0.5);
  const o2=AC.createOscillator(),g2=AC.createGain();
  o2.connect(g2);g2.connect(AC.destination);
  o2.type="square";o2.frequency.value=1200;
  g2.gain.setValueAtTime(0.5,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.018);
  o2.start(t);o2.stop(t+0.02);
  const o3=AC.createOscillator(),fi=AC.createBiquadFilter(),g3=AC.createGain();
  o3.connect(fi);fi.connect(g3);g3.connect(AC.destination);
  o3.type="triangle";o3.frequency.value=420;
  fi.type="bandpass";fi.frequency.value=420;fi.Q.value=18;
  g3.gain.setValueAtTime(0,t+0.008);g3.gain.linearRampToValueAtTime(0.35,t+0.02);
  g3.gain.exponentialRampToValueAtTime(0.001,t+0.45);
  o3.start(t+0.008);o3.stop(t+0.55);
}
function playDone(){
  if(!AC||AC.state!=="running")return;
  const t=AC.currentTime;
  [110,220,330,440,660].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain(),fi=AC.createBiquadFilter();
    o.connect(fi);fi.connect(g);g.connect(AC.destination);
    o.type=i%2===0?"sine":"triangle";o.frequency.value=f;
    fi.type="bandpass";fi.frequency.value=f*1.5;fi.Q.value=6;
    const v=0.95/Math.pow(i+1,0.65);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+0.006);
    g.gain.setTargetAtTime(0.001,t+0.02,1.8);
    o.start(t);o.stop(t+8);
  });
  setTimeout(()=>{
    if(!AC||AC.state!=="running")return;
    const n=AC.currentTime;
    [165,330,495].forEach((f,i)=>{
      const o=AC.createOscillator(),g=AC.createGain();
      o.connect(g);g.connect(AC.destination);
      o.type="sine";o.frequency.value=f;
      const v=0.75/Math.pow(i+1,0.75);
      g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(v,n+0.006);
      g.gain.setTargetAtTime(0.001,n+0.02,1.5);
      o.start(n);o.stop(n+6);
    });
  },380);
}
function playZone(){
  if(!AC||AC.state!=="running")return;
  const t=AC.currentTime;
  [523,659,784].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type="sine";o.frequency.value=f;
    g.gain.setValueAtTime(0,t+i*0.13);g.gain.linearRampToValueAtTime(0.8,t+i*0.13+0.02);
    g.gain.setTargetAtTime(0.001,t+i*0.13+0.07,0.15);
    o.start(t+i*0.13);o.stop(t+1);
  });
}

/* ── COMPACT TIMER CARD ─────────────────────────────────────────────── */
function TimerCard({timer,onRemove}){
  const s=tmStatus(timer);
  let cp,e,tot,rst,prog,rem,zone,totalSec;
  if(timer.multiPhase){
    cp=timer.phases[timer.currentPhase];
    e=(Date.now()-timer.phaseStartTime)/1000;
    tot=cp.totalMin*60;rst=(cp.restMin||0)*60;
    prog=Math.min(1,e/(rst>0?tot+rst:tot));
    rem=s==="done"?0:Math.max(0,(s==="resting"?tot+rst:tot)-e);
    totalSec=rst>0?tot+rst:tot;
    zone=ZONES.find(z=>z.id===cp.zoneId);
  }else{
    e=(Date.now()-timer.startTime)/1000;tot=timer.totalMin*60;rst=(timer.restMin||0)*60;
    prog=Math.min(1,e/(rst>0?tot+rst:tot));
    rem=s==="done"?0:Math.max(0,(s==="resting"?tot+rst:tot)-e);
    totalSec=rst>0?tot+rst:tot;
    zone=ZONES.find(z=>z.id===timer.zid);
  }
  const ST={
    cooking:   {lbl:"Am Grillen",       col:T.gold,  flash:false},
    turn:      {lbl:"⚔ WENDEN!",        col:T.red,   flash:true},
    resting:   {lbl:"✦ Ruhen",          col:T.blue,  flash:false},
    phase_done:{lbl:"🔀 ZONE WECHSELN!",col:"#00CCFF",flash:true},
    done:      {lbl:"✓ FERTIG!",         col:T.green, flash:true},
  }[s]||{lbl:"Am Grillen",col:T.gold,flash:false};
  const ringColor=s==="done"?T.green:s==="resting"?T.blue:timer.gid?DC[timer.gid]||T.gold:T.gold;
  const nx=s==="cooking"?(timer.multiPhase?cp:timer).turns?.find(t=>t*60>e):null;
  const elapsed=s==="done"?totalSec:e;

  return(
    <div style={{background:T.card,borderRadius:12,marginBottom:8,overflow:"hidden",position:"relative",border:`1px solid ${ST.col}50`}}>
      {ST.flash&&<div style={{position:"absolute",inset:0,background:`${ST.col}08`,animation:"pulse 1s infinite",pointerEvents:"none"}}/>}
      {/* Left accent bar */}
      <div style={{position:"absolute",left:0,top:0,bottom:0,width:4,background:ST.col,borderRadius:"12px 0 0 12px"}}/>
      <div style={{padding:"10px 12px 0 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {/* Emoji */}
          <span style={{fontSize:32,flexShrink:0}}>{timer.emoji}</span>
          {/* Info */}
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between"}}>
              <div style={{fontSize:16,fontWeight:900,color:T.text,lineHeight:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{timer.name}</div>
              <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0,marginLeft:6}}>
                {timer.multiPhase&&<div style={{display:"flex",gap:3}}>
                  {timer.phases.map((_,i)=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:i<timer.currentPhase?T.green:i===timer.currentPhase?ST.col:"#333"}}/>)}
                </div>}
                <button onClick={()=>onRemove(timer.id)} style={{background:"none",border:"none",color:"#888",fontSize:22,cursor:"pointer",padding:0,lineHeight:1,fontWeight:900}}>×</button>
              </div>
            </div>
            <div style={{fontSize:12,color:T.muted,marginTop:1}}>{zone?.icon} {zone?.label}{(timer.glbl||timer.garstufeLabel)?` · ${timer.glbl||timer.garstufeLabel}`:""}</div>
          </div>
        </div>
        {/* Countdown row */}
        <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginTop:4}}>
          <div style={{fontSize:38,fontWeight:900,color:ST.col,lineHeight:1,letterSpacing:-1}}>{fmt(rem)}</div>
          <div style={{textAlign:"right"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <div style={{display:"inline-block",background:`${ST.col}20`,color:ST.col,padding:"3px 10px",borderRadius:6,fontSize:13,fontWeight:900}}>{ST.lbl}</div>
              {s!=="done"&&<div style={{fontSize:11,color:T.muted}}>{fmt(rem)} / {fmt(totalSec)}</div>}
            </div>
            {nx&&<div style={{fontSize:14,color:T.gold,marginTop:4,fontWeight:700}}>↻ Wenden in {fmt(nx*60-e)}</div>}
          </div>
        </div>
      </div>
      {/* Progress bar */}
      <div style={{height:4,background:"#1a1a1a",marginTop:8}}>
        <div style={{height:"100%",width:`${prog*100}%`,background:ringColor,transition:"width 1s linear",borderRadius:"0 2px 2px 0"}}/>
      </div>
    </div>
  );
}

/* ── PREHEAT SCREEN ─────────────────────────────────────────────────────── */
function PreheatScreen({pending,setup,rostart,onAddMore,onStart,onRemove,hasTimers,onNav,activeCount}){
  const [,tick]=useState(0);
  useEffect(()=>{const iv=setInterval(()=>tick(t=>t+1),800);return()=>clearInterval(iv);},[]);

  // Group foods by their assigned zone
  const needsInfrarot = pending.some(t=>t.multiPhase);
  const zoneGroups = {}; // {zoneId: {setupTemp, names:[], conflicts:[]}}
  
  pending.forEach(t=>{
    const zid = t.multiPhase ? (t.phases[1]?.zoneId||t.phases[0]?.zoneId) : t.zid;
    if(!zid || zid==="infrarot") return;
    const matchFood = FOODS.find(f=>f.name===t.name);
    const foodTemp = matchFood?.wantedTemp || "mittel";
    const setupTemp = getTemp(setup,zid);
    if(!zoneGroups[zid]) zoneGroups[zid]={setupTemp, names:[], conflicts:[], rostart:getRostart(setup,zid)};
    zoneGroups[zid].names.push(t.name);
    // Flag if food temp doesn't match setup temp
    if(setupTemp !== "aus" && setupTemp !== foodTemp) {
      zoneGroups[zid].conflicts.push({name:t.name, needs:foodTemp});
    }
  });

  // For zones without setup (aus), show what temp is needed
  Object.entries(zoneGroups).forEach(([zid,g])=>{
    if(g.setupTemp==="aus"){
      // find highest needed temp for this zone
      const foods = pending.filter(t=>(t.multiPhase?t.phases[1]?.zoneId:t.zid)===zid);
      const temps = foods.map(t=>FOODS.find(f=>f.name===t.name)?.wantedTemp||"mittel");
      const PRIO={hoch:4,mittel:3,niedrig:2,aus:1};
      g.setupTemp = temps.reduce((a,b)=>PRIO[a]>=PRIO[b]?a:b,"mittel");
      g.isRecommendation = true;
    }
  });

  const rstType = ROSTART_TYPES.find(r=>r.id===rostart)||ROSTART_TYPES[0];

  // Flame animation frames
  const flames=["🔥","🔥","🔥"];

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg}}>
      <StepBar current={2} hasTimers={hasTimers} onNav={onNav} activeCount={activeCount}/>

      {/* Animated flame header */}
      <div style={{textAlign:"center",padding:"20px 16px 12px",flexShrink:0}}>
        <div style={{fontSize:64,lineHeight:1,animation:"flicker 0.8s ease-in-out infinite alternate"}}>🔥</div>
        <div style={{fontSize:22,fontWeight:900,color:T.text,marginTop:8}}>Grill vorheizen</div>
        <div style={{fontSize:14,color:T.sub,marginTop:4}}>Stelle die Brenner ein und warte bis der Grill heiß ist</div>
        <div style={{fontSize:12,color:T.muted,marginTop:4}}>{rstType.icon} {rstType.label}</div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"0 16px 10px"}}>

        {/* Burner recommendations */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,color:T.muted,letterSpacing:1,marginBottom:8}}>EMPFOHLENE EINSTELLUNG:</div>
          {needsInfrarot&&(
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#1a0000",border:`1px solid ${T.red}40`,borderRadius:10,padding:"10px 14px",marginBottom:6}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:22}}>⚡</span>
                <div>
                  <div style={{fontSize:15,fontWeight:900,color:T.red}}>Infrarot</div>
                  <div style={{fontSize:12,color:"#aa6060"}}>Searing – auf Maximum</div>
                </div>
              </div>
              <span style={{background:`${T.red}25`,color:T.red,fontSize:13,fontWeight:900,padding:"4px 10px",borderRadius:6}}>900°C</span>
            </div>
          )}
          {Object.entries(zoneGroups).map(([zid,{setupTemp,names,conflicts:zConflicts,rostart:zRostart,isRecommendation}])=>{
            const zone=ZONES.find(z=>z.id===zid);
            const col=HC[setupTemp]||"#555";
            const rstLabel=(ROSTART_TYPES.find(r=>r.id===zRostart)||ROSTART_TYPES[0]).label;
            return(
              <div key={zid} style={{background:T.card,border:`1px solid ${zConflicts.length>0?T.gold+"50":col+"30"}`,borderRadius:10,padding:"10px 14px",marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:22}}>{zone?.icon}</span>
                    <div>
                      <div style={{fontSize:15,fontWeight:900,color:T.text}}>{zone?.label}</div>
                      <div style={{fontSize:11,color:T.muted}}>{rstLabel}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                    <span style={{background:`${col}25`,color:col,fontSize:13,fontWeight:900,padding:"4px 10px",borderRadius:6}}>
                      {isRecommendation?"→ ":""}{HL[setupTemp]}
                    </span>
                  </div>
                </div>
                <div style={{marginTop:5,fontSize:12,color:"#999"}}>
                  {names.map((n,i)=><span key={i} style={{marginRight:8}}>· {n}</span>)}
                </div>
                {zConflicts.length>0&&(
                  <div style={{marginTop:5,fontSize:11,color:T.gold}}>
                    ⚠ {zConflicts.map(c=>`${c.name} (braucht ${HL[c.needs]})`).join(", ")}
                  </div>
                )}
              </div>
            );
          })}
          {Object.keys(zoneGroups).length===0&&!needsInfrarot&&(
            <div style={{background:T.card,borderRadius:10,padding:"12px 14px",marginBottom:6}}>
              <div style={{fontSize:14,color:T.sub}}>Indirekte Hitze – Deckel schließen und vorheizen.</div>
            </div>
          )}
        </div>

        {/* Pending foods list */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,color:T.muted,letterSpacing:1,marginBottom:8}}>AUF DEM GRILL ({pending.length}x):</div>
          {pending.map(t=>{
            const zid=t.multiPhase?t.phases[t.phases.length-1]?.zoneId:t.zid;
            const zone=ZONES.find(z=>z.id===zid);
            const totalMin=t.multiPhase?t.phases.reduce((s,p)=>s+p.totalMin,0):(t.totalMin||0);
            return(
              <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,background:T.card,borderRadius:10,padding:"10px 14px",marginBottom:6,border:`1px solid ${T.border}`}}>
                <span style={{fontSize:28,flexShrink:0}}>{t.emoji}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:900,color:T.text}}>{t.name}</div>
                  <div style={{fontSize:12,color:T.muted}}>{zone?.icon} {zone?.label} · {totalMin} min</div>
                </div>
                <button onClick={()=>onRemove(t.id)} style={{background:"none",border:"none",color:"#666",fontSize:22,cursor:"pointer",padding:"0 0 0 8px",fontWeight:900}}>×</button>
              </div>
            );
          })}
        </div>

        {/* Add more */}
        <button onClick={onAddMore} style={{width:"100%",padding:"13px 0",background:"transparent",border:`2px dashed ${T.border}`,borderRadius:10,color:T.muted,fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:14}}>
          + Weiteres Grillgut hinzufügen
        </button>
      </div>

      {/* Start button */}
      <div style={{padding:`10px 16px calc(24px + env(safe-area-inset-bottom, 0px))`,flexShrink:0,borderTop:`1px solid ${T.border}`,background:T.bg}}>
        <button onClick={onStart} style={{
          width:"100%",padding:18,background:`linear-gradient(135deg,${T.red},#cc2a20)`,
          border:"none",borderRadius:12,fontSize:18,fontWeight:900,color:"#fff",
          cursor:"pointer",letterSpacing:0.5,
          boxShadow:`0 4px 20px ${T.red}40`,
        }}>
          🔥 GRILL IST HEIß – ALLE TIMER STARTEN
        </button>
      </div>
    </div>
  );
}


/* ── DASHBOARD ──────────────────────────────────────────────────────── */
function Dashboard({timers,onRemove,onAddMore,onReset,onNav}){
  const audioOk = AC && AC.state === "running";
  const alerts=timers.filter(t=>["turn","done","phase_done"].includes(tmStatus(t))).length;
  const active=timers.filter(t=>tmStatus(t)!=="done").length;
  const allDone=timers.length>0&&timers.every(t=>tmStatus(t)==="done");
  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      <StepBar current={2} hasTimers={timers.length>0} onNav={onNav} activeCount={active}/>
      {!audioOk&&timers.length>0&&(
        <div onClick={()=>ia()} style={{background:"#1a1a00",borderBottom:`1px solid ${T.gold}40`,padding:"8px 16px",textAlign:"center",cursor:"pointer",flexShrink:0}}>
          <span style={{fontSize:13,color:T.gold,fontWeight:700}}>🔊 Tippen um Sound zu aktivieren</span>
        </div>
      )}
      <div style={{padding:"10px 16px 8px",flexShrink:0,borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:12}}>
        <img src={LOGO} style={{width:38,height:38,objectFit:"contain",flexShrink:0}} alt=""/>
        <div style={{flex:1}}>
          <div style={{fontSize:22,fontWeight:900,color:T.text,display:"flex",alignItems:"center",gap:10}}>
            Grill Reaper
            {alerts>0&&<span style={{background:T.red,color:"#fff",borderRadius:20,fontSize:13,fontWeight:900,padding:"2px 10px",animation:"pulse 1s infinite"}}>{alerts}</span>}
          </div>
          <div style={{fontSize:13,color:T.sub}}>{active} aktive{active===1?" Timer":" Timer"}</div>
        </div>
        {allDone&&<button onClick={onReset} style={{background:"#1a1a1a",border:`1px solid ${T.border}`,borderRadius:8,color:T.sub,fontSize:13,padding:"6px 12px",cursor:"pointer",fontWeight:700}}>↺ Neu</button>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"10px 14px 100px"}}>
        {timers.length===0
          ?<div style={{textAlign:"center",paddingTop:30}}>
              <img src={LOGO} alt="" style={{width:240,height:240,objectFit:"contain",animation:"bob 3s ease-in-out infinite"}}/>
              <div style={{fontSize:26,fontWeight:900,color:T.text,marginTop:16}}>Grill ist heiß!</div>
              <div style={{fontSize:16,color:T.sub,marginTop:8}}>Erstes Grillgut hinzufügen</div>
            </div>
          :timers.map(t=><TimerCard key={t.id} timer={t} onRemove={onRemove}/>)
        }
      </div>
      <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"10px 14px 26px",background:`linear-gradient(to top,${T.bg} 65%,transparent)`}}>
        <BigBtn label="+ GRILLGUT HINZUFÜGEN" onClick={onAddMore}/>
      </div>
    </div>
  );
}

/* ── APP ────────────────────────────────────────────────────────────── */
function App(){
  const [splash,setSplash]=useState(true);
  const [phase,setPhase]=useState("food");
  const [setup,setSetup]=useState(loadSetup);
  const [rostart] = useState("gusseisen"); // legacy, kept for rstType fallback
  const [onboarded,setOnboarded]=useState(()=>{try{return localStorage.getItem("gr_onboarded")==="2";}catch(e){return false;}});
  const [hasInfrarot,setHasInfrarot]=useState(()=>{try{const v=localStorage.getItem("gr_infrarot");return v===null?true:v==="1";}catch(e){return true;}});
  const [selFood,setSelFood]=useState(null);
  const [selDone,setSelDone]=useState(null);
  const [timers,setTimers]=useState([]);
  const [pending,setPending]=useState([]);
  const [,tick]=useState(0);
  const al=useRef(new Set()),tr=useRef([]);
  useEffect(()=>{tr.current=timers;},[timers]);

  useEffect(()=>{
    const iv=setInterval(()=>{
      tick(t=>t+1);
      tr.current.forEach(tm=>{
        if(tm.multiPhase){
          const cp=tm.phases[tm.currentPhase],e=(Date.now()-tm.phaseStartTime)/1000,tot=cp.totalMin*60,isLast=tm.currentPhase===tm.phases.length-1;
          cp.turns.forEach((t,i)=>{const k=`${tm.id}_p${tm.currentPhase}_t${i}`;if(e>=t*60&&!al.current.has(k)){al.current.add(k);playPlop();}});
          const dk=`${tm.id}_p${tm.currentPhase}_end`;
          if(e>=tot&&!al.current.has(dk)){al.current.add(dk);if(!isLast){playZone();const nx={...tm,currentPhase:tm.currentPhase+1,phaseStartTime:Date.now()};tr.current=tr.current.map(t=>t.id===tm.id?nx:t);setTimers(p=>p.map(t=>t.id===tm.id?nx:t));}else playDone();}
        }else{
          const e=(Date.now()-tm.startTime)/1000,tot=tm.totalMin*60,rst=(tm.restMin||0)*60;
          tm.turns.forEach((t,i)=>{const k=`${tm.id}_t${i}`;if(e>=t*60&&!al.current.has(k)){al.current.add(k);playPlop();}});
          const dk=`${tm.id}_done`;if(e>=tot&&!al.current.has(dk)){al.current.add(dk);playDone();}
          const rk=`${tm.id}_rest`;if(rst>0&&e>=tot+rst&&!al.current.has(rk)){al.current.add(rk);playDone();}
        }
      });
    },1000);
    return()=>clearInterval(iv);
  },[]);

  function buildTimerObj(food,gs,zone,startNow=false){
    const g=gs||{},id=`${food.id}_${Date.now()}`;
    const rf=setup.rostart?ROST_FACTOR[setup.rostart]||1:1;
    const adjMin=(m)=>Math.round(m*rf*10)/10;
    let obj;
    if(food.searing&&zone.id!=="infrarot"){
      obj={id,name:food.name,emoji:food.emoji,multiPhase:true,tip:food.tip,
        phases:[
          {idx:0,label:"⚡ Phase 1: Infrarot Searing",zoneId:"infrarot",totalMin:1.5,turns:[0.75],restMin:0},
          {idx:1,label:`Phase 2: ${g.label||"Nachgaren"} · ${zone.label} (indirekt)`,zoneId:zone.id,totalMin:adjMin(g.totalMin??food.totalMin),turns:g.turns??food.turns??[],restMin:g.restMin||0},
        ],
        currentPhase:0,phaseStartTime:startNow?Date.now():null,garstufeLabel:g.label,gid:g.id};
    }else{
      obj={id,name:food.name,emoji:food.emoji,multiPhase:false,
        totalMin:adjMin(g.totalMin??food.totalMin),turns:g.turns??food.turns??[],
        restMin:g.restMin||0,tip:food.tip,zid:zone.id,glbl:g.label,gid:g.id,
        startTime:startNow?Date.now():null};
    }
    return obj;
  }

  function addToPending(food,gs,zone){
    ia();
    const obj=buildTimerObj(food,gs,zone,false);
    // Add zone and wantedTemp info for preheat screen
    obj._food=food;obj._zone=zone;obj._gs=gs||null;
    setPending(p=>[...p,obj]);
    setPhase("food");setSelFood(null);setSelDone(null);
  }

  function startAllTimers(){
    ia();
    const now=Date.now();
    const started=pending.map(obj=>{
      const o={...obj,startTime:now};
      if(o.multiPhase) o.phaseStartTime=now;
      return o;
    });
    setTimers(p=>[...started,...p]);
    setPending([]);
    setPhase("timers");
  }

  function removeFromPending(id){
    setPending(p=>p.filter(t=>t.id!==id));
  }

  function addTimer(food,gs,zone){
    addToPending(food,gs,zone);
  }
  function removeTimer(id){setTimers(p=>p.filter(t=>t.id!==id));for(const k of al.current)if(k.startsWith(id))al.current.delete(k);}
  function resetSession(){setTimers([]);setPending([]);al.current.clear();setPhase("food");}

  return(
    <div style={{width:"100%",height:"100vh",background:T.bg,display:"flex",flexDirection:"column",overflow:"hidden",color:T.text}}>
      <style>{`
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{background:#000;}::-webkit-scrollbar{display:none;}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
        @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        @keyframes flicker{0%{transform:scale(1) rotate(-2deg);opacity:.9}100%{transform:scale(1.08) rotate(2deg);opacity:1}}
        @keyframes flicker{0%{transform:scale(1) rotate(-2deg);filter:brightness(1);}100%{transform:scale(1.15) rotate(2deg);filter:brightness(1.3);}}
      `}</style>
      <div style={{height:"env(safe-area-inset-top,0px)",background:T.bg,flexShrink:0}}/>
      {!onboarded&&!splash
        ?<OnboardingScreen onDone={(s,inf)=>{setSetup(s);setHasInfrarot(inf);setOnboarded(true);}}/>
        :splash
        ?<Splash onDone={()=>{ia();setSplash(false);}}/>
        :<div style={{flex:1,overflow:"hidden",position:"relative"}}>
          {(()=>{
            const hasT=timers.length>0||pending.length>0;
            const actC=timers.filter(t=>tmStatus(t)!=="done").length;
            const nav=(i)=>{
              if(i===0)setPhase("setup");
              else if(i===1){setSelFood(null);setSelDone(null);setPhase("food");}
              else if(i===2){
                if(pending.length>0)setPhase("preheat");
                else if(timers.length>0)setPhase("timers");
              }
            };
            return(<>
              {phase==="setup"    &&<SetupScreen    setup={setup} setSetup={setSetup} onNext={()=>setPhase("food")} hasTimers={hasT} onNav={nav} activeCount={actC}/>}
              {phase==="food"     &&<FoodScreen     setup={setup} onSelect={f=>{setSelFood(f);setPhase(f.garstufen?"doneness":"zone");}} onBack={()=>setPhase(pending.length>0?"preheat":"setup")} hasTimers={hasT} onNav={nav} activeCount={actC} pendingCount={pending.length}/>}
              {phase==="doneness" &&selFood&&<DonenessScreen food={selFood} onSelect={g=>{setSelDone(g);setPhase("zone");}} onBack={()=>setPhase("food")} hasTimers={hasT} onNav={nav} activeCount={actC}/>}
              {phase==="zone"     &&selFood&&<ZoneScreen food={selFood} garstufe={selDone} setup={setup} onConfirm={z=>addToPending(selFood,selDone,z)} onBack={()=>setPhase(selFood.garstufen?"doneness":"food")} hasTimers={hasT} onNav={nav} activeCount={actC}/>}
              {phase==="preheat"  &&<PreheatScreen pending={pending} setup={setup} rostart={rostart} onAddMore={()=>setPhase("food")} onStart={startAllTimers} onRemove={removeFromPending} hasTimers={hasT} onNav={nav} activeCount={actC}/>}
              {phase==="preheat"  &&<PreheatScreen pending={pending} setup={setup} onStart={startAllTimers} onAddMore={()=>setPhase("food")} onRemove={removeFromPending} onNav={nav} activeCount={actC}/>}
              {phase==="timers"   &&<Dashboard timers={timers} onRemove={removeTimer} onAddMore={()=>setPhase("food")} onReset={resetSession} onNav={nav}/>}
            </>);
          })()}
        </div>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App,null));
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW:',e)));}</script>
</body>
</html>
